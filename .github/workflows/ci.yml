name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Permet de declencher manuellement la CI depuis l'onglet Actions, utile
  # pour relancer un build apres un fix infra sans avoir a push un commit.
  workflow_dispatch:

permissions:
  contents: read
  # Necessaire pour le job `release` qui push les images vers GHCR.
  # Permissions lues uniquement par les jobs qui en ont besoin (job-level
  # override possible si on voulait restreindre, mais ici inutile car les
  # autres jobs n'utilisent pas ce token).
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint, prisma, build, audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        # `npm ci` requires package-lock.json. Si absent, fallback sur `npm install`.
        continue-on-error: false

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        # Strict : un lint qui passe en continue-on-error masque la dette technique.
        # On garde un seuil de warnings tolere mais la commande doit reussir.
        run: npm run lint -- --max-warnings 50

      - name: Build
        run: npm run build

      - name: Audit (production deps only)
        # On garde continue-on-error sur l'audit : certaines CVE indirectes n'ont
        # pas de patch upstream et bloqueraient la CI sans recours immediat.
        # A monitorer via une issue manuelle si l'output devient verbeux.
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Run tests
        run: npm test --if-present

  frontend:
    name: Frontend (lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          INTERNAL_API_URL: http://backend:4000

      - name: Audit (production deps only)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  docker-build:
    name: Docker images build (smoke)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: crm-mdo-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: crm-mdo-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=https://crm.mdoservices.fr/api

  # ============================================================================
  # CD : build + push images vers GHCR sur push main uniquement.
  # Bloque par les jobs precedents (backend/frontend/docker-build) — si l'un
  # echoue, pas d'image publiee. Les serveurs deployes via scripts/deploy.sh
  # tirent ces images. Tags : `latest` + `sha-<short>` pour rollback facile.
  # ============================================================================
  release:
    name: Release images to GHCR
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/crm-mdo-backend:latest
            ghcr.io/${{ github.repository_owner }}/crm-mdo-backend:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/crm-mdo-frontend:latest
            ghcr.io/${{ github.repository_owner }}/crm-mdo-frontend:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=https://crm.mdoservices.fr/api
