<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hors ligne — CRM MDO Services</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0a0a0a;
        color: #fafafa;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .card {
        max-width: 480px;
        text-align: center;
      }
      h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
      p { color: #a1a1aa; line-height: 1.5; }
      button {
        margin-top: 1.5rem;
        padding: 0.75rem 1.5rem;
        background: #1d4ed8;
        color: white;
        border: 0;
        border-radius: 0.5rem;
        font-size: 1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Connexion indisponible</h1>
      <p>
        Le CRM ne peut pas joindre le serveur pour le moment. Vérifiez votre
        connexion réseau ou réessayez dans quelques instants.
      </p>
      <button onclick="location.reload()">Réessayer</button>
    </div>
  </body>
</html>
