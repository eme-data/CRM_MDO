# Override prod : ajoute Caddy + HTTPS auto + ferme les ports exposes
# Usage : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  caddy:
    image: caddy:2-alpine
    container_name: crm_mdo_caddy
    restart: unless-stopped
    # DNS publics pour resolver acme-v02.api.letsencrypt.org lors de l'emission du certificat.
    # Contourne le probleme systemd-resolved / 127.0.0.53 d'Ubuntu 24.04.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    # Admin API Caddy expose sur le reseau interne uniquement : permet au
    # backend de reload la config dynamiquement (CaddyProvisioningService)
    # quand un tenant est cree/modifie/supprime. JAMAIS exposer port 2019
    # publiquement (controle total de Caddy).
    expose:
      - "2019"
    volumes:
      # Caddyfile bind-mount initial (utilise au boot). Apres regenerate-caddy,
      # le backend ecrit dans le meme path via le volume monte cote backend
      # (cf service backend : - caddy-config-shared:/etc/caddy).
      - caddy-config-shared:/etc/caddy
      - caddy-data:/data
      - caddy-config:/config
      # Access logs JSON exposes a l'hote pour CrowdSec.
      - /var/log/caddy:/var/log/caddy
    depends_on:
      - backend
      - frontend

  backend:
    ports: []
    environment:
      # Active la regeneration auto de la config Caddy quand un tenant est
      # cree/modifie/supprime. URL admin sur le reseau Docker interne.
      CADDY_PROVISIONING: enabled
      CADDY_ADMIN_URL: http://caddy:2019
      CADDY_CONFIG_PATH: /etc/caddy/Caddyfile
    volumes:
      # Volume partage avec caddy pour ecrire la Caddyfile regeneree
      - caddy-config-shared:/etc/caddy

  postgres:
    ports: []

  redis:
    ports: []

  frontend:
    ports: []

volumes:
  caddy-data:
  caddy-config:
  caddy-config-shared:
