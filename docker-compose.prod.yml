# Override prod : ajoute Caddy + HTTPS auto + ferme les ports exposes
# Usage : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  caddy:
    image: caddy:2-alpine
    container_name: crm_mdo_caddy
    restart: unless-stopped
    # DNS publics pour resolver acme-v02.api.letsencrypt.org lors de l'emission du certificat.
    # Contourne le probleme systemd-resolved / 127.0.0.53 d'Ubuntu 24.04.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend
      - frontend

  postgres:
    ports: []

  redis:
    ports: []

  backend:
    ports: []

  frontend:
    ports: []

volumes:
  caddy-data:
  caddy-config:
