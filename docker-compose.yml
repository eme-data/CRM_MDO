# Docker Compose — DEV local (sans HTTPS, sans Traefik)
# Pour la prod : utiliser docker-compose.prod.yml en plus

services:
  postgres:
    image: postgres:16-alpine
    container_name: crm_mdo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-Europe/Paris}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Bornes par defaut pour un VPS Hostinger KVM 2 (2 vCPU / 8 Go).
    # Ajustables via .env (POSTGRES_MEM, POSTGRES_CPUS).
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEM:-1500m}
          cpus: '${POSTGRES_CPUS:-1.5}'
        reservations:
          memory: 256m
    # Mecanismes de defense contre les exploits OS : pas de privileges, pas
    # de nouveau capability, no-new-privileges au demarrage.
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    container_name: crm_mdo_redis
    restart: unless-stopped
    # maxmemory hard cap pour eviter qu'une queue BullMQ qui s'embale ne sature
    # tout le RAM du VPS. Avec allkeys-lru, Redis evicte les cles les moins
    # utilisees en arrivant a la limite.
    command:
      [
        "redis-server",
        "--requirepass", "${REDIS_PASSWORD}",
        "--appendonly", "yes",
        "--maxmemory", "${REDIS_MAXMEMORY:-256mb}",
        "--maxmemory-policy", "allkeys-lru"
      ]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM:-384m}
          cpus: '${REDIS_CPUS:-0.5}'
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-production}
    container_name: crm_mdo_backend
    restart: unless-stopped
    # DNS publics pour resolver les services externes (SMTP, etc.)
    # contourne le probleme systemd-resolved / 127.0.0.53 d'Ubuntu 24.04
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SECRETS_MASTER_KEY: ${SECRETS_MASTER_KEY}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      CORS_ORIGIN: ${CORS_ORIGIN}
      CONTRACT_ALERT_DAYS: ${CONTRACT_ALERT_DAYS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_SECURE: ${SMTP_SECURE}
      INBOUND_EMAIL_ENABLED: ${INBOUND_EMAIL_ENABLED:-false}
      INBOUND_AUTO_ACK: ${INBOUND_AUTO_ACK:-true}
      UPLOADS_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-25}
      SYSTEM_BACKUP_DIR: /app/backups
      SIRENE_API_KEY: ${SIRENE_API_KEY}
      IMAP_HOST: ${IMAP_HOST}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_SECURE: ${IMAP_SECURE:-true}
      IMAP_USER: ${IMAP_USER}
      IMAP_PASSWORD: ${IMAP_PASSWORD}
      IMAP_FOLDER: ${IMAP_FOLDER:-INBOX}
      IMAP_PROCESSED_FOLDER: ${IMAP_PROCESSED_FOLDER}
      TZ: ${TZ:-Europe/Paris}
      PORT: ${BACKEND_PORT:-4000}
    volumes:
      - attachments-data:/app/uploads
      - system-backups:/app/backups
    ports:
      - "4000:4000"
    deploy:
      resources:
        limits:
          memory: ${BACKEND_MEM:-1g}
          cpus: '${BACKEND_CPUS:-1.5}'
        reservations:
          memory: 256m
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: crm_mdo_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      TZ: ${TZ:-Europe/Paris}
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: ${FRONTEND_MEM:-512m}
          cpus: '${FRONTEND_CPUS:-1.0}'
        reservations:
          memory: 128m
    security_opt:
      - no-new-privileges:true

volumes:
  postgres-data:
  redis-data:
  attachments-data:
  system-backups:
